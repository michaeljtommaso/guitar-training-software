# COOP/COEP headers for cross-origin isolation (SharedArrayBuffer / threads,
# needed by the WASM/WebGPU perception workers). Deploy reference only — add
# this to the server/location block serving apps/web's built assets.
#
# add_header Cross-Origin-Opener-Policy "same-origin" always;
# add_header Cross-Origin-Embedder-Policy "require-corp" always;

add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Embedder-Policy "require-corp" always;
