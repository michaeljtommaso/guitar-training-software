name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too makes pnpm/action-setup@v4 hard-error.
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: node --test scripts/license-rules.test.mjs
      - run: node scripts/check-licenses.mjs

  # `pnpm typecheck|lint|test|build` are all `pnpm -r` (recursive), so this one
  # job covers BOTH workspace apps — apps/web AND apps/annotation-tool.
  web:
    runs-on: ubuntu-latest
    needs: license-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too makes pnpm/action-setup@v4 hard-error.
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm bundle-size

  # Synthetic-fixture regression gate (WP-7 §16): the committed fixtures through
  # the real code paths. FAILS the build on any accuracy/latency regression. NOT
  # the §16 real-hardware accuracy gates (those need real captures — see BLOCKERS).
  eval-smoke:
    runs-on: ubuntu-latest
    needs: license-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too makes pnpm/action-setup@v4 hard-error.
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm eval-smoke

  # Fake-device capture smoke (WP-1). NON-BLOCKING for now: it needs a Chromium
  # + system deps install and has not been exercised on a GitHub runner yet, so a
  # green here is informational, not a merge gate. Promote to a required check
  # once it's confirmed stable on ubuntu-latest.
  e2e:
    runs-on: ubuntu-latest
    needs: license-check
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # pnpm version comes from package.json's "packageManager" field —
      # specifying it here too makes pnpm/action-setup@v4 hard-error.
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      # Playwright needs the browser binary + its system libs on the runner.
      - run: pnpm --filter ./apps/web exec playwright install --with-deps chromium
      # The e2e webServer runs `pnpm build && vite preview` with fake camera/mic
      # (see apps/web/playwright.config.ts launch args).
      - run: pnpm --filter ./apps/web e2e
      # BUG-002 guard: same fake-device drive, but against the DEV server, so the
      # vision worker's dev-only wasm-loader path can't silently regress again
      # (preview alone hid that the vision leg was dead in `vite dev`).
      - run: pnpm --filter ./apps/web e2e:dev

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest -q
